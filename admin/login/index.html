<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập Admin | Bến Chill Garden</title>
  <link rel="stylesheet" href="/admin/admin.css">
</head>
<body class="login-page">
  <main class="login-card">
    <img src="/ben-chill-logo.png" alt="Bến Chill Garden">
    <h1>Admin Nhà Bến</h1>
    <p class="muted">Đăng nhập bằng tài khoản được tạo trong Supabase.</p>
    <form id="loginForm">
      <label>Email<input type="email" name="email" autocomplete="email" required></label>
      <label>Mật khẩu<input type="password" name="password" autocomplete="current-password" required></label>
      <button class="btn primary full" type="submit">Đăng nhập</button>
    </form>
    <p class="muted" id="loginMessage"></p>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/assets/cms/cms-config.js"></script>
  <script src="/admin/admin.js"></script>
</body>
</html>
